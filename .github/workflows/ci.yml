name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Smoke test — train + predict
        run: |
          python -m src.train
          python -c "from src.predict import MediPredictor; p = MediPredictor(); print(p.predict({'age':60,'glucose':180,'bmi':34,'blood_pressure':140,'cholesterol':250,'insulin':150,'heart_rate':90,'smoking':1,'physical_activity':2,'family_history':1}, disease='diabetes')['risk_level'])"
